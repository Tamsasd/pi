<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Pi-nap</title>
  </head>
  <body>
    <h1>π napi memóriajáték</h1>

    <div id="start-infos">
      <h3>Add meg az adataid a kezdéshez!</h3>
      <input type="text" id="nameInput" placeholder="Név" />
      <select name="zoltan" id="classInput">
        <option value="">Osztály</option>
      </select>
      <button id="start-button" class="primary-btn" type="button">Start</button>
    </div>

    <div id="lives"></div>

    <div id="digits-container">
      <p id="digits">3.141592653589793238462643383279502884</p>
    </div>

    <div id="end-window">
      <h3>Játék vége :(</h3>
      <button class="exit-end close-btn">✕</button>

      <div id="end-infos-grid">
        <div class="end-info name-card">
          <h4>versenyző</h4>
          <p id="end-name"></p>
        </div>
        <div class="end-info rank-card">
          <h4>helyezés</h4>
          <p id="end-rank"></p>
        </div>
        <div class="end-info digits-card">
          <h4>számjegyek</h4>
          <p id="end-digits"></p>
        </div>
        <div class="end-info time-card">
          <h4>idő</h4>
          <p id="end-time"></p>
        </div>
      </div>

      <p class="next-digit-info">
        A következő számjegy a(z) <span id="end-next"></span> lett volna.
      </p>

      <button class="exit-end primary-btn">Következő játékos</button>
    </div>

    <div class="main">
      <div class="flex-row">
        <h3>Top 5 játékos:</h3>
        <button id="btn-leaderboard" class="primary-btn">
          Teljes ranglista
        </button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Helyezés</th>
            <th>Név</th>
            <th>Osztály</th>
            <th>Számjegy</th>
            <th>Idő</th>
          </tr>
        </thead>
        <tbody id="ranking"></tbody>
      </table>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
